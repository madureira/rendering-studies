<svg xmlns="http://www.w3.org/2000/svg" width="310" height="28">
  <defs>
    <clipPath id="r">
      <rect width="310" height="28" rx="4"/>
    </clipPath>
    <linearGradient id="shimmer" x1="0" y1="0" x2="310" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="44%"  stop-color="white" stop-opacity="0"/>
      <stop offset="50%"  stop-color="white" stop-opacity="0.28"/>
      <stop offset="56%"  stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        from="-310 0" to="310 0" dur="2s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#r)">
    <rect width="95" height="28" fill="#555"/>
    <rect x="95" width="215" height="28" fill="#654FF0"/>
    <rect width="310" height="28" fill="url(#shimmer)"/>
  </g>

  <g clip-path="url(#r)" font-family="DejaVu Sans,Verdana,Geneva,sans-serif"
     font-size="11" fill="white" font-weight="bold">
    <text x="47" y="19" text-anchor="middle" letter-spacing="1">LIVE DEMO</text>
    <text x="202" y="19" text-anchor="middle" letter-spacing="0.3">Try it in your browser</text>
  </g>
</svg>
